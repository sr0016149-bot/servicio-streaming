<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Streaming Premium</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
font-family:'Poppins',sans-serif;
background: radial-gradient(circle at 30% 20%, rgba(0,255,200,0.12), transparent 40%),
            radial-gradient(circle at 70% 60%, rgba(0,150,255,0.12), transparent 40%),
            linear-gradient(135deg,#050505,#0a0f1c,#000);
color:#fff;
margin:0;
padding:15px;
min-height:100vh
}

h1,h2{text-align:center;font-weight:600}

.contador{
text-align:center;
background:rgba(29,185,84,0.15);
border:1px solid rgba(29,185,84,0.5);
padding:10px;
border-radius:20px;
margin:10px auto 25px auto;
max-width:400px;
}

.filtros{text-align:center;margin:20px 0}

.productos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
max-width:1100px;
margin:auto
}

.producto{
background:rgba(255,255,255,0.06);
backdrop-filter:blur(15px);
border:1px solid rgba(0,255,200,0.2);
border-radius:20px;
padding:18px;
text-align:center;
transition:.4s;
box-shadow:0 8px 32px rgba(0,0,0,0.5);
}

.producto:hover{
transform:translateY(-8px) scale(1.03);
border:1px solid #00ffc8;
box-shadow:0 0 25px rgba(0,255,200,0.4);
}

.mas-vendido{
position:absolute;
top:10px;
left:10px;
background:#f1c40f;
color:#000;
padding:5px 10px;
border-radius:20px;
font-size:12px;
}

.logo{width:65px}
.poster{width:100%;max-width:180px;border-radius:12px}

button{
background:linear-gradient(45deg,#1DB954,#00ff88);
border:none;
color:#fff;
padding:12px;
width:100%;
border-radius:30px;
font-weight:700;
cursor:pointer;
}

.carrusel{
display:flex;
gap:15px;
overflow-x:auto;
}

.carrito,.checkout{
background:rgba(255,255,255,0.06);
border-radius:20px;
padding:20px;
max-width:500px;
margin:25px auto;
}

.whatsapp-float{
position:fixed;
bottom:25px;
right:25px;
background:#25D366;
color:white;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
text-decoration:none;
}

.modal{
display:none;
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
}

.modal-content{
background:#000;
margin:5% auto;
padding:20px;
max-width:700px;
border-radius:15px;
}
</style>
</head>

<body>

<h1>📺 Streaming Premium</h1>
<h2>Activación rápida • Garantía</h2>

<div class="contador">
🔥 +2500 clientes activos | ⚡ Activación inmediata
</div>

<div class="productos" id="streaming"></div>

<h2>🎬 Películas</h2>
<div class="carrusel" id="peliculas"></div>

<div class="carrito">
<h2>🛒 Pedido (<span id="cantidad">0</span>)</h2>
<div id="lista"></div>
<h3>Total: $<span id="total">0</span></h3>
</div>

<div class="checkout">
<button onclick="enviarPedido()">📲 Enviar pedido</button>
</div>

<a href="https://wa.me/5491161124784" class="whatsapp-float" target="_blank">💬</a>

<div id="trailerModal" class="modal">
<div class="modal-content">
<span onclick="cerrarTrailer()">✖</span>
<iframe id="videoTrailer" width="100%" height="400"></iframe>
</div>
</div>

<script>
let carrito=[];

const plataformas=[
["Netflix",5800,"img/netflix.png"],
["Disney+",4500,"img/disney.png"],
["HBO Max",3000,"img/hbomax.png"],
["Prime Video",3000,"img/prime.png"]
];

const peliculas=[
["Zootopia 2","img/zootopia2.jpg","https://www.youtube.com/embed/7gytUpiues8"],
["FNAF 2","img/fnaf2.jpg","https://www.youtube.com/embed/E8M-iJ0p-Xk"]
];

const cont=document.getElementById("streaming");

plataformas.forEach(p=>{
cont.innerHTML+=`
<div class="producto">
<img src="${p[2]}" class="logo">
<h3>${p[0]}</h3>
<p>$${p[1]}</p>
<button onclick="agregar('${p[0]}',${p[1]})">Agregar</button>
</div>`;
});

peliculas.forEach(p=>{
document.getElementById("peliculas").innerHTML+=`
<div class="producto">
<img src="${p[1]}" class="poster">
<h3>${p[0]}</h3>
<button onclick="verTrailer('${p[2]}')">🎬 Ver Trailer</button>
<button onclick="agregar('${p[0]}',1000)">Agregar</button>
</div>`;
});

function agregar(nombre,precio){
let boton = event.target;
carrito.push({nombre,precio});
render();

boton.innerText="✔";
setTimeout(()=>boton.innerText="Agregar",1000);
}

function render(){
let total=0;
let lista=document.getElementById("lista");
lista.innerHTML="";
carrito.forEach(i=>{
total+=i.precio;
lista.innerHTML+=`<div>${i.nombre} - $${i.precio}</div>`;
});
document.getElementById("total").innerText=total;
document.getElementById("cantidad").innerText=carrito.length;
}

function enviarPedido(){
let msg="Hola quiero:%0A";
carrito.forEach(i=>msg+=i.nombre+"%0A");
window.open("https://wa.me/5491161124784?text="+msg);
}

function verTrailer(link){
document.getElementById("trailerModal").style.display="block";
document.getElementById("videoTrailer").src=link;
}

function cerrarTrailer(){
document.getElementById("trailerModal").style.display="none";
}
</script>

</body>
</html>
